<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitBill</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  background:#f6f7fb;
  font-family:'DM Sans';
  overflow:hidden;
}

*{box-sizing:border-box}

/* SCREEN SYSTEM */
.screen{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  background:#f6f7fb;

  transform:translateX(100%);
  opacity:0;
  transition:all .35s cubic-bezier(.22,.61,.36,1);
}

.screen.active{
  transform:translateX(0);
  opacity:1;
  z-index:2;
}

.screen.exit-left{
  transform:translateX(-100%);
  opacity:0;
  z-index:1;
}

/* CONTAINER */
.container{
  max-width:420px;
  margin:auto;
  background:#fff;
  min-height:100%;
}

/* HERO */
.hero{
  background:#1B4FFF;
  color:#fff;
  padding:20px;
  display:flex;
  align-items:center;
  gap:12px;
  border-radius:0 0 24px 24px;
}

.hero h1{
  margin:0;
  font-family:'Syne';
  font-size:28px;
}

.hero span{color:#FF3FA4}

/* CONTENT */
.content{padding:16px 16px 120px}

.label{
  font-size:12px;
  font-weight:700;
  margin:12px 0 6px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:8px;
}

.row{display:flex;gap:8px}

/* BUTTON */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-weight:700;
  margin-top:10px;
  cursor:pointer;
}

.blue{background:#1B4FFF;color:#fff}
.pink{background:#FF3FA4;color:#fff}

.btn:active{transform:scale(.97)}

/* RESULT */
.result{
  background:#1B4FFF;
  color:#fff;
  padding:16px;
  border-radius:14px;
  margin-top:16px;
}

/* PERSON */
.person{
  border-bottom:1px solid #eee;
  padding:10px 0;
}

/* STICKY */
.sticky{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:420px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  padding:12px;
  display:flex;
  gap:10px;
  box-shadow:0 -6px 16px rgba(0,0,0,.08);
}

/* LANDING */
.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  height:100%;
  padding:20px;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="screen active center">
  <h1>Split<span style="color:#FF3FA4">Bill</span></h1>
  <p>Hitung patungan biar gak ribet 💸</p>

  <button class="btn blue" onclick="openMode('makan')">🍽️ Makan Bareng</button>
  <button class="btn pink" onclick="openMode('patungan')">🛒 Patungan Barang</button>
</div>

<!-- APP -->
<div id="app" class="screen">
  <div class="container">

    <div class="hero">
      <button onclick="goBack()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 10px;border-radius:10px;">←</button>
      <h1>Split<span>Bill</span></h1>
    </div>

    <div class="content">

      <div class="label">Total Kasir</div>
      <input id="kasir" inputmode="numeric">

      <div class="label">Pajak (%)</div>
      <input id="tax" value="11" inputmode="numeric">

      <!-- MAKAN -->
      <div id="makanUI">
        <div class="label">Orang & Harga</div>
        <div id="people"></div>
        <button class="btn" onclick="addPerson()">+ tambah orang</button>
      </div>

      <!-- PATUNGAN -->
      <div id="patunganUI" style="display:none">
        <div class="label">Jumlah Orang</div>
        <input id="jumlah">

        <div class="label">Nama (pisah koma)</div>
        <input id="names">

        <div class="label">Transfer ke</div>
        <input id="rek_nama" placeholder="Nama">
        <input id="rek_bank" placeholder="Bank + No Rek">
      </div>

      <div id="result"></div>
      <div id="detect"></div>

    </div>
  </div>
</div>

<!-- STICKY -->
<div class="sticky">
  <button class="btn blue" onclick="hitung()">Hitung</button>
  <button class="btn pink" onclick="resetAll()">Reset</button>
</div>

<script>

let mode = 'makan';
let people = [{name:'',price:''}];

function getNum(v){
  return parseFloat((v||'').replace(/\./g,''))||0;
}

/* NAVIGATION FIX (LEVEL 2 CORE) */
function showScreen(screen, push=true){
  const landing = document.getElementById('landing');
  const app = document.getElementById('app');

  if(screen === 'app'){
    landing.classList.add('exit-left');
    app.classList.add('active');

    setTimeout(()=>landing.style.display='none',350);
  }

  if(screen === 'landing'){
    landing.style.display='block';
    app.classList.remove('active');

    setTimeout(()=>landing.classList.remove('exit-left'),10);
  }

  if(push){
    history.pushState({screen},'');
  }
}

function openMode(m){
  mode = m;

  document.getElementById('makanUI').style.display = m==='makan'?'block':'none';
  document.getElementById('patunganUI').style.display = m==='patungan'?'block':'none';

  showScreen('app');
}

function goBack(){
  showScreen('landing');
}

/* BACK BUTTON HP */
window.addEventListener('popstate',(e)=>{
  const screen = e.state?.screen || 'landing';
  showScreen(screen,false);
});

history.replaceState({screen:'landing'},'');

/* PEOPLE */
function addPerson(){
  people.push({name:'',price:''});
  render();
}

function render(){
  const el = document.getElementById('people');
  el.innerHTML = '';

  people.forEach((p,i)=>{
    el.innerHTML += `
      <div class="row">
        <input placeholder="Nama" onchange="people[${i}].name=this.value">
        <input placeholder="Harga" inputmode="numeric"
        oninput="this.value=this.value.replace(/\\D/g,'').replace(/\\B(?=(\\d{3})+(?!\\d))/g,'.');people[${i}].price=this.value">
      </div>
    `;
  });
}

/* HITUNG */
function hitung(){
  let kasir = getNum(document.getElementById('kasir').value);
  let tax = getNum(document.getElementById('tax').value);

  let subtotal = 0;

  if(mode === 'makan'){
    subtotal = people.reduce((s,p)=>s+getNum(p.price),0);
    let taxTotal = subtotal * (tax/100);
    let grand = subtotal + taxTotal;

    let html = `<div class="result">Total: Rp ${grand.toLocaleString('id-ID')}</div>`;

    people.forEach(p=>{
      let share = subtotal ? (getNum(p.price)/subtotal)*taxTotal : 0;
      let total = getNum(p.price)+share;

      html += `
        <div class="person">
          <b>${p.name||'-'}</b><br>
          Rp ${total.toLocaleString('id-ID')}
        </div>
      `;
    });

    document.getElementById('result').innerHTML = html;
  }

  if(mode === 'patungan'){
    let count = getNum(document.getElementById('jumlah').value)||1;
    let names = document.getElementById('names').value.split(',');

    let taxTotal = kasir * (tax/100);
    let grand = kasir + taxTotal;
    let per = grand / count;

    let html = `<div class="result">Total: Rp ${grand.toLocaleString('id-ID')}</div>`;

    names.forEach(n=>{
      html += `<div class="person">${n}: Rp ${per.toLocaleString('id-ID')}</div>`;
    });

    document.getElementById('result').innerHTML = html;
  }
}

/* RESET */
function resetAll(){
  location.reload();
}

render();

</script>

</body>
</html>
