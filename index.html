<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SplitBill</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  background:#f6f7fb;
  font-family:'DM Sans';
  overflow:hidden;
}

/* 🔥 SCREEN SYSTEM */
.screen{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  overflow:auto;
  background:#f6f7fb;

  transform:translateX(100%);
  opacity:0;
  transition:all .35s cubic-bezier(.22,.61,.36,1);
  will-change:transform;
}

.screen.active{
  transform:translateX(0);
  opacity:1;
  z-index:2;
}

.screen.exit-left{
  transform:translateX(-100%);
  opacity:0;
}

.container{
  max-width:420px;
  margin:auto;
  min-height:100%;
  background:#fff;
}

.hero{
  background:#1B4FFF;
  color:#fff;
  padding:18px 16px;
  border-radius:0 0 24px 24px;
  display:flex;
  align-items:center;
  gap:10px;
}

.hero h1{
  margin:0;
  font-family:'Syne';
  font-size:30px;
}

.hero span{color:#FF3FA4}

.back-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  color:#fff;
  padding:6px 10px;
  border-radius:10px;
  font-size:14px;
}

.center{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-weight:700;
  margin-top:10px;
  cursor:pointer;
  transition:.2s;
}

.btn:active{transform:scale(.97)}

.blue{background:#1B4FFF;color:#fff}
.pink{background:#FF3FA4;color:#fff}

.content{padding:16px 16px 120px}

.label{
  font-size:11px;
  font-weight:700;
  margin:10px 0 6px;
  color:#444;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:8px;
}

.row{display:flex;gap:8px}

.result{
  background:#1B4FFF;
  color:#fff;
  padding:18px;
  border-radius:18px;
  margin-top:20px;
}

.person{
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.badge{
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:13px;
}

.ok{background:#E1F5EE;color:#085041}
.warn{background:#FAEEDA;color:#633806}
.err{background:#FCEBEB;color:#791F1F}

.share{
  margin-top:10px;
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-weight:700;
}

.sticky{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:420px;
  display:flex;
  gap:10px;
  background:#fff;
  padding:12px;
  box-shadow:0 -6px 16px rgba(0,0,0,.08);
}
</style>

</head>

<body>

<!-- LANDING -->

<div id="landing" class="screen active center">
  <h1>Split<span>Bill</span></h1>
  <p>Itung dulu ya, biar hati tenang gak ada utang</p>

<button class="btn blue" onclick="openMode('makan')">🍽️ Makan Bareng</button> <button class="btn pink" onclick="openMode('patungan')">🛒 Patungan Barang</button>

</div>

<!-- APP -->

<div id="app" class="screen">

<div class="container">

<div class="hero">
  <button class="back-btn" onclick="goBack()">←</button>
  <h1>Split<span>Bill</span></h1>
</div>

<div class="content">

<div class="label">Total kasir (opsional)</div>
<input id="kasir" inputmode="numeric">

<div class="label">Tanggal & Tempat</div>
<div class="row">
<input id="tanggal" type="date">
<input id="tempat" placeholder="Tempat">
</div>

<div class="label">Pajak (%)</div>
<input id="tax" value="11" inputmode="numeric">

<!-- MAKAN -->

<div id="makanUI">
<div class="label">Siapa bayar berapa</div>
<div id="people"></div>
<button onclick="addPerson()">+ tambah orang</button>

<div class="label">Biaya lain</div>
<div id="extras"></div>
<button onclick="addExtra()">+ tambah biaya</button>
</div>

<!-- PATUNGAN -->

<div id="patunganUI" style="display:none">
<div class="label">Jumlah orang</div>
<input id="jumlah">

<div class="label">Nama (pisah koma)</div>
<input id="names">

<div class="label">Transfer ke</div>
<input id="rek_nama">
<input id="rek_bank">
</div>

<div id="result"></div>
<div id="detect"></div>
<div id="share" class="share" style="display:none" onclick="shareWA()">Share WA 🚀</div>

</div>
</div>
</div>

<!-- BOTTOM -->

<div class="sticky">
<button class="btn blue" onclick="hitung()">Hitung</button>
<button class="btn pink" onclick="location.reload()">Reset</button>
</div>

<script>

let mode='makan';
let people=[{name:'',price:''}];
let extras=[];

function openMode(m){
  mode=m;

  const landing=document.getElementById('landing');
  const app=document.getElementById('app');

  document.getElementById('makanUI').style.display=m==='makan'?'block':'none';
  document.getElementById('patunganUI').style.display=m==='patungan'?'block':'none';

  landing.classList.add('exit-left');
  app.classList.add('active');

  setTimeout(()=>{
    landing.classList.remove('active','exit-left');
  },350);
}

function goBack(){
  const landing=document.getElementById('landing');
  const app=document.getElementById('app');

  landing.classList.add('active');
  app.classList.add('exit-left');

  setTimeout(()=>{
    app.classList.remove('active','exit-left');
  },300);
}

function addPerson(){
  people.push({name:'',price:''});
  render();
}

function render(){
  peopleEl.innerHTML='';
  people.forEach((p,i)=>{
    peopleEl.innerHTML+=`
    <div class="row">
      <input placeholder="Nama" onchange="people[${i}].name=this.value">
      <input placeholder="Harga" inputmode="numeric"
      oninput="people[${i}].price=this.value">
    </div>`;
  });
}

function addExtra(){
  extras.push({amount:''});
  extrasEl.innerHTML='';
  extras.forEach((e,i)=>{
    extrasEl.innerHTML+=`
    <input placeholder="Biaya" oninput="extras[${i}].amount=this.value">`;
  });
}

function hitung(){

let subtotal=0,extraTotal=0,taxTotal=0;

if(mode==='makan'){

subtotal=people.reduce((s,p)=>s+(+p.price||0),0);
extraTotal=extras.reduce((s,e)=>s+(+e.amount||0),0);
taxTotal=subtotal*(+tax.value/100);

let grand=subtotal+taxTotal+extraTotal;

let html=`<div class="result">Rp ${grand.toLocaleString('id-ID')}</div>`;

people.forEach(p=>{
html+=`<div class="person">${p.name} - Rp ${(+p.price||0).toLocaleString('id-ID')}</div>`;
});

result.innerHTML=html;
}

detect.innerHTML='';
share.style.display='block';

}

function shareWA(){
let text=result.innerText+"\n\nCuss bayar ya gaesss!";
window.open('https://wa.me/?text='+encodeURIComponent(text));
}

render();

</script>

</body>
</html>
