<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitBill</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
html,body{margin:0;padding:0;background:#f6f7fb;font-family:'DM Sans'}
*{box-sizing:border-box}

.screen{display:none}
.active{display:block}

.container{max-width:420px;margin:auto;min-height:100vh;background:#fff}

.hero{
  background:#1B4FFF;
  color:#fff;
  padding:24px;
  border-radius:0 0 28px 28px;
}
.hero h1{margin:0;font-family:'Syne';font-size:38px}
.hero span{color:#FF3FA4}
.hero p{font-size:13px;opacity:.85}

.center{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-weight:700;
  margin-top:10px;
}

.blue{background:#1B4FFF;color:#fff}
.pink{background:#FF3FA4;color:#fff}

.content{padding:16px 16px 100px}

.label{font-size:11px;font-weight:700;margin:10px 0 6px}
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:8px;
}

.row{display:flex;gap:8px}

.card{
  background:#fff;
  border:1px solid #eee;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.result{
  background:#1B4FFF;
  color:#fff;
  padding:18px;
  border-radius:18px;
  margin-top:20px;
}

.badge{padding:10px;border-radius:10px;margin-top:10px;font-size:13px}
.ok{background:#E1F5EE;color:#085041}
.warn{background:#FAEEDA;color:#633806}
.err{background:#FCEBEB;color:#791F1F}

.person{border-bottom:1px solid #eee;padding:10px 0}

.share{
  margin-top:10px;
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-weight:700;
}

.sticky{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:420px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  padding:12px;
  display:flex;
  gap:10px;
  box-shadow:0 -6px 16px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="screen active center">
  <h1>Split<span>Bill</span></h1>
  <p>Itung dulu ya, biar hati tenang gak ada utang</p>
  <button class="btn blue" onclick="openMode('makan')">🍽️ Makan Bareng</button>
  <button class="btn pink" onclick="openMode('patungan')">🛒 Patungan Barang</button>
</div>

<!-- APP -->
<div id="app" class="screen">
<div class="container">

<div class="hero">
  <h1>Split<span>Bill</span></h1>
</div>

<div class="content">

<!-- COMMON -->
<div class="label">Total kasir (opsional)</div>
<input id="kasir" inputmode="numeric">

<div class="label">Tanggal & Tempat Pembelian</div>
<div class="row">
  <input id="tanggal" type="date">
  <input id="tempat" placeholder="Nama tempat">
</div>

<div class="label">Pajak</div>
<label><input type="checkbox" id="tax_toggle" checked onchange="toggleTax()"> Pakai pajak</label>
<input id="tax" value="11" inputmode="numeric">

<!-- MAKAN -->
<div id="makanUI">

<div class="label">Siapa bayar berapa</div>
<div id="people"></div>
<button onclick="addPerson()">+ tambah orang</button>

<div class="label">Biaya lain</div>
<div id="extras"></div>
<button onclick="addExtra()">+ tambah biaya</button>

</div>

<!-- PATUNGAN -->
<div id="patunganUI" style="display:none">

<div class="label">Jumlah orang</div>
<input id="jumlah">

<div class="label">Nama (pisah koma)</div>
<input id="names">

<div class="label">Biaya lain</div>
<div id="extras2"></div>
<button onclick="addExtra2()">+ biaya</button>

<div class="label">Transfer ke</div>
<input id="rek_nama" placeholder="Nama">
<input id="rek_bank" placeholder="Bank + No Rek">

</div>

<div id="result"></div>
<div id="detect"></div>
<div id="share" class="share" style="display:none" onclick="shareWA()">Share ke WhatsApp 🚀</div>

</div>
</div>
</div>

<div class="sticky">
  <button class="btn blue" onclick="hitung()">Hitung</button>
  <button class="btn pink" onclick="resetAll()">Reset</button>
</div>

<script>

let mode='makan';
let people=[{name:'',price:''}];
let extras=[];
let extras2=[];

function openMode(m){
  mode=m;
  document.getElementById('landing').classList.remove('active');
  document.getElementById('app').classList.add('active');

  document.getElementById('makanUI').style.display = m==='makan'?'block':'none';
  document.getElementById('patunganUI').style.display = m==='patungan'?'block':'none';
}

function toggleTax(){
  let t=tax_toggle.checked;
  tax.disabled=!t;
  if(!t) tax.value='';
  else if(!tax.value) tax.value='11';
}

function getNum(v){return parseFloat((v||'').replace(/\./g,''))||0;}

function addPerson(){
  people.push({name:'',price:''});
  render();
}

function render(){
  let el=document.getElementById('people');el.innerHTML='';
  people.forEach((p,i)=>{
    el.innerHTML+=`
    <div class="row">
      <input placeholder="Nama" onchange="people[${i}].name=this.value">
      <input placeholder="Harga" inputmode="numeric"
      oninput="this.value=this.value.replace(/\\D/g,'').replace(/\\B(?=(\\d{3})+(?!\\d))/g,'.');people[${i}].price=this.value">
    </div>`;
  });
}

function addExtra(){
  extras.push({amount:''});
  renderExtras();
}
function renderExtras(){
  let el=document.getElementById('extras');el.innerHTML='';
  extras.forEach((e,i)=>{
    el.innerHTML+=`<input placeholder="Biaya"
    oninput="this.value=this.value.replace(/\\D/g,'').replace(/\\B(?=(\\d{3})+(?!\\d))/g,'.');extras[${i}].amount=this.value">`;
  });
}

function addExtra2(){
  extras2.push({amount:''});
  let el=document.getElementById('extras2');
  el.innerHTML+=`<input placeholder="Biaya">`;
}

function hitung(){

let subtotal=0, extraTotal=0, taxTotal=0, grand=0, kasirVal=getNum(kasir.value);

if(mode==='makan'){
  subtotal=people.reduce((s,p)=>s+getNum(p.price),0);
  extraTotal=extras.reduce((s,e)=>s+getNum(e.amount),0);
  taxTotal= tax_toggle.checked ? subtotal*(getNum(tax.value)/100) : 0;
  grand=subtotal+taxTotal+extraTotal;

  let html=`<div id="hasil" class="result">Rp ${Math.round(grand).toLocaleString('id-ID')}</div>`;

  people.forEach(p=>{
    let prop=subtotal?getNum(p.price)/subtotal:0;
    let myTax=taxTotal*prop;
    let myExtra=extraTotal/people.length;
    let total=getNum(p.price)+myTax+myExtra;

    html+=`<div class="person"><b>${p.name||'-'}</b><br>
    Bayar: Rp ${getNum(p.price).toLocaleString('id-ID')}<br>
    Pajak: Rp ${Math.round(myTax).toLocaleString('id-ID')}<br>
    Lain: Rp ${Math.round(myExtra).toLocaleString('id-ID')}<br>
    <b>Total: Rp ${Math.round(total).toLocaleString('id-ID')}</b></div>`;
  });

  result.innerHTML=html;
}

if(mode==='patungan'){
  let total=getNum(kasir.value);
  taxTotal= tax_toggle.checked ? total*(getNum(tax.value)/100) : 0;
  grand=total+taxTotal;
  let count=getNum(jumlah.value)||1;

  let per=grand/count;
  let arr=names.value.split(',');

  let html=`<div id="hasil" class="result">Rp ${Math.round(grand).toLocaleString('id-ID')}</div>`;

  arr.forEach(n=>{
    html+=`<div class="person">${n}: Rp ${Math.round(per).toLocaleString('id-ID')}</div>`;
  });

  html+=`<div class="person"><b>Transfer ke:</b><br>${rek_nama.value}<br>${rek_bank.value}</div>`;

  result.innerHTML=html;
}

// ===== DETECT =====
let detectHTML='';
if(kasirVal){
  let diff=Math.abs(grand-kasirVal);

  if(mode==='makan'){
    let est=(kasirVal-subtotal-extraTotal)/subtotal*100;
    if(est>0) detectHTML+=`<div class="badge warn">🔍 Estimasi pajak ${est.toFixed(1)}%</div>`;
  }

  if(diff<500) detectHTML+=`<div class="badge ok">✅ Cocok</div>`;
  else if(diff<5000) detectHTML+=`<div class="badge warn">⚠️ Selisih Rp ${diff.toLocaleString('id-ID')}</div>`;
  else detectHTML+=`<div class="badge err">❌ Selisih besar Rp ${diff.toLocaleString('id-ID')}</div>`;
}

detect.innerHTML=detectHTML;
share.style.display='block';

setTimeout(()=>document.getElementById('hasil').scrollIntoView({behavior:'smooth'}),100);

}

// SHARE
function shareWA(){
  let text=document.getElementById('result').innerText;
  window.open('https://wa.me/?text='+encodeURIComponent(text));
}

// RESET
function resetAll(){location.reload();}

// INIT
render();

</script>

</body>
</html>
