<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitBill</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #fff;
    }

    * {
      box-sizing: border-box;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      background: #fff;
      font-family: 'DM Sans', sans-serif;
    }

    .hero {
      background: #1B4FFF;
      padding: 22px 20px 26px;
      border-radius: 0 0 28px 28px;
      color: #fff;
    }

    .hero-appname {
      font-family: 'Syne', sans-serif;
      font-size: 40px;
      font-weight: 800;
    }

    .hero-appname span {
      color: #FF3FA4;
    }

    .hero-sub {
      font-size: 13px;
      opacity: 0.8;
    }

    .content {
      width: 100%;
      padding: 16px;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .action-row button {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-hitung {
      background: #1B4FFF;
      color: #fff;
    }

    .btn-reset {
      background: #FF3FA4;
      color: #fff;
    }

    /* Desktop biar tetap rapi */
    @media (min-width: 768px) {
      .content {
        max-width: 480px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>

<div class="app">

  <div class="hero">
    <div class="hero-appname">Split<span>Bill</span></div>
    <div class="hero-sub">
      Gasss, hitung tagihan bareng!<br>
      Biar gak ada yang kabur duluan
    </div>
  </div>

  <div class="content">

    <div class="section">
      <div class="section-label">Total Struk</div>
      <input type="number" placeholder="Masukkan total" id="total">
    </div>

    <div class="section">
      <div class="section-label">Nama</div>
      <input type="text" placeholder="Nama teman" id="name">
    </div>

    <div class="section">
      <div class="section-label">Harga</div>
      <input type="number" placeholder="Harga" id="price">
    </div>

    <div class="action-row">
      <button class="btn-hitung" onclick="hitung()">Hitung</button>
      <button class="btn-reset" onclick="resetForm()">Reset</button>
    </div>

    <h2 id="result"></h2>

  </div>

</div>

<script>
function hitung() {
  const total = parseFloat(document.getElementById('total').value) || 0;
  const price = parseFloat(document.getElementById('price').value) || 0;

  const result = total - price;

  document.getElementById('result').innerText = 
    "Sisa: Rp " + result.toLocaleString("id-ID");
}

function resetForm() {
  document.getElementById('total').value = '';
  document.getElementById('price').value = '';
  document.getElementById('name').value = '';
  document.getElementById('result').innerText = '';
}
</script>

</body>
</html>
