<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitBill</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B4FFF">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
html,body{margin:0;padding:0;width:100%;background:#fff}
*{box-sizing:border-box}

.app{width:100%;min-height:100vh;font-family:'DM Sans',sans-serif}

.hero{
  background:#1B4FFF;
  padding:24px;
  border-radius:0 0 28px 28px;
  color:#fff;
}

.hero h1{font-family:'Syne';font-size:38px;margin:0}
.hero span{color:#FF3FA4}

.content{padding:16px}

.section{margin-bottom:18px}
.label{font-size:11px;font-weight:700;margin-bottom:6px}

input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:8px;
}

.row{display:flex;gap:8px}

.btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:700;
}

.blue{background:#1B4FFF;color:#fff}
.pink{background:#FF3FA4;color:#fff}

.result{
  background:#1B4FFF;
  color:#fff;
  padding:18px;
  border-radius:18px;
  margin-top:20px;
}

.person{display:flex;justify-content:space-between;padding:10px 0}

.add{color:#1B4FFF;font-size:13px;cursor:pointer}

.share{
  margin-top:10px;
  background:#25D366;
  color:#fff;
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:700;
  cursor:pointer;
}

@media(min-width:768px){
  .content{max-width:480px;margin:auto}
}
</style>
</head>

<body>

<div class="app">

<div class="hero">
  <h1>Split<span>Bill</span></h1>
  <p>Hitung bareng, biar gak ribet 😎</p>
</div>

<div class="content">

<div class="section">
  <div class="label">Pajak (%)</div>
  <input id="tax" type="number" value="11">
</div>

<div class="section">
  <div class="label">Orang</div>
  <div id="people"></div>
  <div class="add" onclick="addPerson()">+ tambah orang</div>
</div>

<div class="section">
  <div class="label">Biaya lain</div>
  <input id="extra" type="number">
</div>

<div class="section">
  <div class="label">Mode</div>
  <select id="mode">
    <option value="rata">Rata</option>
    <option value="prop">Proporsional</option>
  </select>
</div>

<div class="row">
  <button class="btn blue" onclick="hitung()">Hitung</button>
  <button class="btn pink" onclick="resetAll()">Reset</button>
</div>

<div id="result"></div>
<div id="shareBtn" class="share" onclick="shareWA()" style="display:none">
  Share ke WhatsApp 🚀
</div>

</div>
</div>

<script>

// ===== STORAGE =====
function save(){
  localStorage.setItem('splitbill',JSON.stringify({people,tax:taxInput.value,extra:extraInput.value,mode:modeSelect.value}))
}

function load(){
  const data=JSON.parse(localStorage.getItem('splitbill'));
  if(!data)return;
  people=data.people||[];
  taxInput.value=data.tax||11;
  extraInput.value=data.extra||0;
  modeSelect.value=data.mode||'rata';
}

// ===== PEOPLE =====
let people=[{name:'',price:0}];

function addPerson(){
  people.push({name:'',price:0});
  render();
}

function render(){
  const el=document.getElementById('people');
  el.innerHTML='';
  people.forEach((p,i)=>{
    el.innerHTML+=`
    <div class="row">
      <input value="${p.name}" placeholder="Nama" onchange="people[${i}].name=this.value;save()">
      <input type="number" value="${p.price}" placeholder="Harga" onchange="people[${i}].price=parseFloat(this.value)||0;save()">
    </div>`;
  });
}

// ===== HITUNG =====
function hitung(){
  const tax=parseFloat(taxInput.value)||0;
  const extra=parseFloat(extraInput.value)||0;
  const mode=modeSelect.value;

  const subtotal=people.reduce((a,b)=>a+b.price,0);
  const taxTotal=subtotal*(tax/100);
  const grand=subtotal+taxTotal+extra;

  let msg=`🍽️ Split Bill\nTotal: Rp ${Math.round(grand).toLocaleString('id-ID')}\n\n`;

  let html=`<div class="result">Total: Rp ${Math.round(grand).toLocaleString('id-ID')}</div>`;

  people.forEach(p=>{
    let share=0;
    if(mode==='rata'){
      share=grand/people.length;
    }else{
      const prop=p.price/subtotal;
      share=p.price + taxTotal*prop + extra*prop;
    }

    msg+=`${p.name||'-'}: Rp ${Math.round(share).toLocaleString('id-ID')}\n`;

    html+=`<div class="person"><span>${p.name||'-'}</span><b>Rp ${Math.round(share).toLocaleString('id-ID')}</b></div>`;
  });

  document.getElementById('result').innerHTML=html;
  document.getElementById('shareBtn').style.display='block';

  window.lastMsg=msg;
  save();
}

// ===== SHARE WA =====
function shareWA(){
  const url='https://wa.me/?text='+encodeURIComponent(window.lastMsg);
  window.open(url,'_blank');
}

// ===== RESET =====
function resetAll(){
  localStorage.clear();
  people=[{name:'',price:0}];
  render();
  document.getElementById('result').innerHTML='';
  document.getElementById('shareBtn').style.display='none';
}

// init
const taxInput=document.getElementById('tax');
const extraInput=document.getElementById('extra');
const modeSelect=document.getElementById('mode');

load();
render();

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
