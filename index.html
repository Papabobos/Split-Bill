<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitBill</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B4FFF">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
html,body{margin:0;padding:0;background:#fff}
*{box-sizing:border-box}

.app{width:100%;min-height:100vh;font-family:'DM Sans'}

.hero{
  background:#1B4FFF;
  padding:24px;
  border-radius:0 0 28px 28px;
  color:#fff;
}

.hero h1{margin:0;font-family:'Syne';font-size:38px}
.hero span{color:#FF3FA4}

.content{padding:16px}

.section{margin-bottom:18px}
.label{font-size:11px;font-weight:700;margin-bottom:6px}

input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:8px;
}

.row{display:flex;gap:8px;margin-bottom:8px}

.btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:700;
}

.blue{background:#1B4FFF;color:#fff}
.pink{background:#FF3FA4;color:#fff}

.add{font-size:13px;color:#1B4FFF;cursor:pointer}

.result{
  background:#1B4FFF;
  color:#fff;
  padding:18px;
  border-radius:18px;
  margin-top:20px;
}

.person{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.share{
  margin-top:10px;
  background:#25D366;
  color:#fff;
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:700;
  cursor:pointer;
}

@media(min-width:768px){
  .content{max-width:480px;margin:auto}
}
</style>
</head>

<body>

<div class="app">

<div class="hero">
  <h1>Split<span>Bill</span></h1>
  <p>Gasss biar gak ada yang kabur 😎</p>
</div>

<div class="content">

<div class="section">
  <div class="label">Pajak (%)</div>
  <input id="tax" type="number" value="11">
</div>

<div class="section">
  <div class="label">Orang</div>
  <div id="people"></div>
  <div class="add" onclick="addPerson()">+ tambah orang</div>
</div>

<div class="section">
  <div class="label">Biaya lain</div>
  <div id="extras"></div>
  <div class="add" onclick="addExtra()">+ tambah biaya</div>
</div>

<div class="section">
  <div class="label">Mode</div>
  <select id="mode">
    <option value="rata">Rata</option>
    <option value="prop">Proporsional</option>
  </select>
</div>

<div class="row">
  <button class="btn blue" onclick="hitung()">Hitung</button>
  <button class="btn pink" onclick="resetAll()">Reset</button>
</div>

<div id="result"></div>
<div id="shareBtn" class="share" onclick="shareWA()" style="display:none">
  Share ke WhatsApp 🚀
</div>

</div>
</div>

<script>

let people=[{name:'',price:0}];
let extras=[];

// STORAGE
function save(){
  localStorage.setItem('sb',JSON.stringify({people,extras,tax:tax.value,mode:mode.value}));
}
function load(){
  const d=JSON.parse(localStorage.getItem('sb'));
  if(!d)return;
  people=d.people||people;
  extras=d.extras||extras;
  tax.value=d.tax||11;
  mode.value=d.mode||'rata';
}

// PEOPLE
function addPerson(){
  people.push({name:'',price:0});
  render();
}
function removePerson(i){
  if(people.length===1)return;
  people.splice(i,1);render();
}

// EXTRA
function addExtra(){
  extras.push({label:'',amount:0});
  render();
}
function removeExtra(i){
  extras.splice(i,1);render();
}

// RENDER
function render(){
  const pEl=document.getElementById('people');
  pEl.innerHTML='';
  people.forEach((p,i)=>{
    pEl.innerHTML+=`
    <div class="row">
      <input value="${p.name}" placeholder="Nama" onchange="people[${i}].name=this.value;save()">
      <input type="number" value="${p.price}" placeholder="Harga" onchange="people[${i}].price=parseFloat(this.value)||0;save()">
      <button onclick="removePerson(${i})">x</button>
    </div>`;
  });

  const eEl=document.getElementById('extras');
  eEl.innerHTML='';
  extras.forEach((e,i)=>{
    eEl.innerHTML+=`
    <div class="row">
      <input value="${e.label}" placeholder="Biaya" onchange="extras[${i}].label=this.value;save()">
      <input type="number" value="${e.amount}" placeholder="Rp" onchange="extras[${i}].amount=parseFloat(this.value)||0;save()">
      <button onclick="removeExtra(${i})">x</button>
    </div>`;
  });
}

// HITUNG
function hitung(){
  const taxPct=parseFloat(tax.value)||0;
  const subtotal=people.reduce((s,p)=>s+p.price,0);
  const taxTotal=subtotal*(taxPct/100);
  const extraTotal=extras.reduce((s,e)=>s+e.amount,0);
  const grand=subtotal+taxTotal+extraTotal;

  let msg=`🍽️ Split Bill\nTotal: Rp ${Math.round(grand).toLocaleString('id-ID')}\n\n`;
  let html=`<div class="result">Total: Rp ${Math.round(grand).toLocaleString('id-ID')}</div>`;

  people.forEach(p=>{
    let share=0;
    if(mode.value==='rata'){
      share=grand/people.length;
    }else{
      const prop=p.price/subtotal;
      share=p.price + taxTotal*prop + extraTotal*prop;
    }

    msg+=`${p.name||'-'}: Rp ${Math.round(share).toLocaleString('id-ID')}\n`;
    html+=`<div class="person"><span>${p.name||'-'}</span><b>Rp ${Math.round(share).toLocaleString('id-ID')}</b></div>`;
  });

  document.getElementById('result').innerHTML=html;
  document.getElementById('shareBtn').style.display='block';

  window.msg=msg;
  save();
}

// SHARE
function shareWA(){
  window.open('https://wa.me/?text='+encodeURIComponent(window.msg),'_blank');
}

// RESET
function resetAll(){
  localStorage.clear();
  people=[{name:'',price:0}];
  extras=[];
  render();
  result.innerHTML='';
  shareBtn.style.display='none';
}

// INIT
load();
render();

// SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
