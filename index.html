<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitBill</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  font-family:'DM Sans';
  background:#f6f7fb;
}

/* SCREEN SYSTEM */
.screen{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  overflow:auto;
  background:#f6f7fb;
  transform:translateX(100%);
  opacity:0;
  transition:.35s cubic-bezier(.22,.61,.36,1);
}

.screen.active{
  transform:translateX(0);
  opacity:1;
  z-index:2;
}

.screen.exit{
  transform:translateX(-100%);
  opacity:0;
}

/* UI */
.container{max-width:420px;margin:auto;background:#fff;min-height:100%}

.hero{
  background:#1B4FFF;
  color:#fff;
  padding:16px;
  display:flex;
  align-items:center;
  gap:10px;
  border-radius:0 0 20px 20px;
}

.back{
  background:rgba(255,255,255,.2);
  border:none;
  color:#fff;
  padding:6px 10px;
  border-radius:10px;
}

.hero h1{margin:0;font-family:'Syne'}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  height:100%;
  padding:20px;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-weight:700;
  margin-top:10px;
}

.blue{background:#1B4FFF;color:#fff}
.pink{background:#FF3FA4;color:#fff}

.content{padding:16px 16px 120px}

label{font-size:12px;font-weight:700}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin:6px 0;
}

.row{display:flex;gap:8px}

.person{padding:8px 0;border-bottom:1px solid #eee}

.result{
  background:#1B4FFF;
  color:#fff;
  padding:16px;
  border-radius:14px;
  margin-top:10px;
}

.share{
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:14px;
  text-align:center;
  font-weight:700;
  margin-top:10px;
}

.sticky{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:420px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:10px;
  background:#fff;
  box-shadow:0 -5px 15px rgba(0,0,0,.1);
}
</style>

</head>

<body>

<!-- LANDING -->

<div id="landing" class="screen active center">
<h1>SplitBill</h1>
<p>Itung dulu ya, biar tenang</p>

<button class="btn blue" onclick="openMode('makan')">🍽️ Makan Bareng</button> <button class="btn pink" onclick="openMode('patungan')">🛒 Patungan Barang</button>

</div>

<!-- APP -->

<div id="app" class="screen">

<div class="container">

<div class="hero">
<button class="back" onclick="goBack()">←</button>
<h1>SplitBill</h1>
</div>

<div class="content">

<label>Total kasir</label> <input id="kasir">

<label>Tanggal & Tempat</label>

<div class="row">
<input id="tanggal" type="date">
<input id="tempat">
</div>

<label>Pajak (%)</label> <input id="tax" value="11">

<!-- MAKAN -->

<div id="makanUI">
<label>Siapa bayar berapa</label>
<div id="people"></div>
<button onclick="addPerson()">+ tambah orang</button>

<label>Biaya lain</label>

<div id="extras"></div>
<button onclick="addExtra()">+ biaya</button>
</div>

<!-- PATUNGAN -->

<div id="patunganUI" style="display:none">

<label>Jumlah orang</label> <input id="jumlah">

<label>Nama (pisah koma)</label> <input id="names">

<label>Biaya lain</label>

<div id="extras2"></div>
<button onclick="addExtra2()">+ biaya</button>

</div>

<!-- 🔥 REKENING (WAJIB ADA DI 2 MODE) -->

<label>Transfer ke</label> <input id="rek_nama" placeholder="Nama"> <input id="rek_bank" placeholder="Bank & No Rek">

<div id="result"></div>
<div id="share" class="share" onclick="shareWA()">Share WhatsApp</div>

</div>
</div>
</div>

<!-- BOTTOM -->

<div class="sticky">
<button class="btn blue" onclick="hitung()">Hitung</button>
<button class="btn pink" onclick="location.reload()">Reset</button>
</div>

<script>

let mode='makan';
let people=[{name:'',price:''}];
let extras=[];
let extras2=[];

/* NAV */
function openMode(m){
mode=m;

landing.classList.add('exit');
app.classList.add('active');

document.getElementById('makanUI').style.display=m==='makan'?'block':'none';
document.getElementById('patunganUI').style.display=m==='patungan'?'block':'none';

setTimeout(()=>{
landing.classList.remove('active','exit');
},300);
}

function goBack(){
landing.classList.add('active');
app.classList.remove('active');
}

/* DATA */
function addPerson(){
people.push({name:'',price:''});
render();
}

function render(){
peopleEl.innerHTML='';
people.forEach((p,i)=>{
peopleEl.innerHTML+=`
<div class="row">
<input placeholder="Nama" onchange="people[${i}].name=this.value">
<input placeholder="Harga" onchange="people[${i}].price=this.value">
</div>`;
});
}

function addExtra(){
extras.push({amount:''});
extrasEl.innerHTML='';
extras.forEach((e,i)=>{
extrasEl.innerHTML+=`<input placeholder="Biaya" onchange="extras[${i}].amount=this.value">`;
});
}

function addExtra2(){
extras2.push({amount:''});
extras2El.innerHTML+=`<input placeholder="Biaya">`;
}

/* HITUNG */
function hitung(){

let subtotal=0,extra=0,tax=0;

if(mode==='makan'){
subtotal=people.reduce((s,p)=>s+(+p.price||0),0);
extra=extras.reduce((s,e)=>s+(+e.amount||0),0);
tax=subtotal*(+tax.value/100);

let grand=subtotal+extra+tax;

let html=`<div class="result">Total: Rp ${grand.toLocaleString('id-ID')}</div>`;

people.forEach(p=>{
html+=`<div class="person">${p.name} - Rp ${(p.price||0)}</div>`;
});

result.innerHTML=html;
}

if(mode==='patungan'){
let total=+kasir.value||0;
tax=total*(+tax.value/100);
let grand=total+tax;

let per=grand/(+jumlah.value||1);

let html=`<div class="result">Total: Rp ${grand.toLocaleString('id-ID')}</div>`;

names.value.split(',').forEach(n=>{
html+=`<div class="person">${n} - Rp ${per.toFixed(0)}</div>`;
});

result.innerHTML=html;
}

share.style.display='block';
}

/* SHARE */
function shareWA(){
let text=result.innerText+
"\n\nTransfer ke: "+rek_nama.value+" - "+rek_bank.value+
"\n\nCuss bayar ya!";
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

/* INIT */
render();

</script>

</body>
</html>
